    <!--
      Título/descripción/keywords/canonical/OG/Twitter son intencionalmente
      omitidos aquí: cada página los define vía <Helmet> (src/pages/**) y el
      build los "hornea" por ruta en scripts/prerender.mjs. Duplicar un
      valor genérico aquí causaba <link rel="canonical"> repetido en el DOM
      (uno estático + uno de Helmet), lo que Bing interpretaba como
      contenido duplicado y rechazaba indexar. Este fallback solo se ve en
      `npm run dev` o si una ruta no está en la lista de prerender.
    -->

    <meta name="author" content="UniCali Team" />
    <meta name="google-site-verification" content="MpW8x6soGlqt0cXrHezUPHG6qOikFacCk176McwNdb8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />

    <!-- PWA / Add to Home Screen (identidad: Calculadora UNSA, ver /herramientas/calculadora-unsa) -->
    <meta name="theme-color" content="#8b004a" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Calc. UNSA" />
    <!-- Font preconnects — avoids render-blocking @import -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
